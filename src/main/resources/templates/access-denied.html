<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 500px; text-align: center; padding: 3rem; }
        .error-icon { font-size: 5rem; color: #dc3545; margin-bottom: 1.5rem; }
        .btn-home { background: #1a1a2e; color: white; border-radius: 8px; padding: 0.75rem 2rem; font-weight: 600; }
        .btn-home:hover { background: #0f3460; color: white; }
    </style>
</head>
<body>

<div class="card error-card">
    <div class="error-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>🚫</span>
    </div>
    <h2 class="fw-bold mb-3">접근 권한이 없습니다</h2>
    <p class="text-muted mb-4">
        죄송합니다. 요청하신 페이지에 접근할 수 있는 권한이 없습니다.<br>
        관리자 계정으로 로그인되어 있는지 확인해 주세요.
    </p>
    <a th:href="@{/home}" class="btn btn-home">홈으로 돌아가기</a>
</div>

<footer class="fixed-bottom text-center py-3 text-muted small">
  <p th:text="'작성자 : 이재혁 2191276 | 일시 : ' + ${#temporals.format(T(java.time.LocalDateTime).now(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
